project: PLS_MNIST
program: experiments/pls/train.py
method: grid
parameters:
  model:
    values: ['game','alphagame','power','msg','sgha','incremental']
  config.n_components:
    values: [16]
  config.data:
    values: ['mnist']
  config.epochs:
    values: [10]
  config.learning_rate:
    values: [5e-2,5e-3,5e-4]
  config.val_interval:
    values: [50]
  config.batch_size:
    values: [32, 256, 1024]