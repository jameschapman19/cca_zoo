project: PLS_XRMB
program: experiments/pls/train.py
method: grid
parameters:
  model:
    values: ['gameR','alphagameR']
  config.n_components:
    values: [16]
  config.data:
    values: ['xrmb']
  config.epochs:
    values: [1]
  config.learning_rate:
   values: [1e-1,1e-2,1e-3]
  config.val_interval:
    values: [50]
  config.batch_size:
    values: [16, 256, 1024]