command:
  - ${env}
  - python3
  - ${program}
  - ${args}
program: experiments/train.py
method: grid
project: blockeigengame
parameters:
  config:
    values: [ experiments/config.py ]
  experiment:
    values: [ 'CCA' ]
  model:
    values: [ 'eigengame' ]
  data:
    values: [ 'linear','mnist','mediamill' ]
  learning_rate:
    values: [ 1e-1,50 ]
  learning_rate_2:
    values: [ 1,5,1e-1 ]
  logging_interval:
    values: [ 0.05 ]
  batch_size:
    values: [ 128 ]
  n_components:
    values: [ 5 ]