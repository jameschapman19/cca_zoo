command:
  - ${env}
  - python3
  - ${program}
  - ${args}
program: experiments/train.py
method: grid
project: blockeigengame
parameters:
  config:
    values: [ experiments/config.py ]
  experiment:
    values: [ 'PLS' ]
  model:
    values: [ 'game', 'sgha', 'msg' ]
  data:
    values: [ 'xrmb' ]
  learning_rate:
    values: [ 1e-1,1e-2, 1e-3 ]
  logging_interval:
    values: [ 0.05 ]
  batch_size:
    values: [ 32,64,128 ]
  n_components:
    values: [ 5 ]