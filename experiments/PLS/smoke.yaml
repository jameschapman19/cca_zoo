command:
  - ${env}
  - python3
  - ${program}
  - ${args}
program: experiments/train.py
method: grid
project: blockeigengame
parameters:
  config:
    values: [ experiments/config.py ]
  experiment:
    values: [ 'PLS' ]
  model:
    values: [ 'alphagame','game', 'sgha', 'msg','incremental','saa','sgha','ssgd']
  data:
    values: [ 'linear','mnist','mediamill','xrmb' ]
  learning_rate:
    values: [ 1e-1]
  batch_size:
    values: [ 0 ]
  n_components:
    values: [ 1 ]